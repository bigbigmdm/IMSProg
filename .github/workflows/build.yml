name: Build

on:
  push:
    branches-ignore:
      - "debian/**"
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/index.html"
  pull_request:
    branches-ignore:
      - "debian/**"
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/index.html"
  workflow_dispatch:

env:
  CMAKE_INSTALL_PARALLEL_LEVEL: 4

jobs:
  amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [Ubuntu-22, Ubuntu-24, Ubuntu-26, Debian-13, Debian-12, Debian-Testing, Debian-Experimental]
        cpp_compiler: [g++]
        include:
          - name: Ubuntu-22
            image: "ubuntu:22.04"
            ubuntu: 22
            deps: cmake g++ libusb-1.0-0-dev qtbase5-dev qttools5-dev pkgconf udev file
          - name: Ubuntu-24
            image: "ubuntu:24.04"
            ubuntu: 24
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Ubuntu-26
            image: "ubuntu:26.04"
            ubuntu: 26
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Debian-13
            image: "debian:trixie"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Debian-13
            image: "debian:trixie"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Debian-12
            image: "debian:bookworm"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools udev file
          - name: Debian-12
            image: "debian:bookworm"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools udev file
          - name: Debian-Testing
            image: "debian:testing"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Debian-Testing
            image: "debian:testing"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Debian-Experimental
            image: "debian:experimental"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
          - name: Debian-Experimental
            image: "debian:experimental"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev file
    container:
      image: ${{ matrix.image }}
      env:
        LANG: en_US.UTF-8
        BUILD_TYPE: ${{ matrix.build_type }}
        CC: ${{ matrix.c_compiler }}
        CXX: ${{ matrix.cpp_compiler }}
        WITH_PROJ: ON
        APT_LISTCHANGES_FRONTEND: none
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install packages required
        shell: bash
        run: |
          echo "Installing dependencies for ${{ matrix.name }}"
          apt-get update -qq
          apt-get install -yq ${{ matrix.deps }}
      
      - uses: actions/checkout@v7
      
      - name: Build and Package DEB
        working-directory: .
        run: |
          # 1. Standard build and staging phases
          cmake -S . -B build/ -DCMAKE_BUILD_TYPE=Release
          cmake --build build/ --parallel
          cmake --install build/
          
          # 2. Package generation phase using CPack with full metadata and CMake layout mappings.
          cd build
          cpack -G DEB \
            -D CPACK_PACKAGE_NAME="imsprog" \
            -D CPACK_PACKAGE_VENDOR="BigBigMDM" \
            -D CPACK_PACKAGE_VERSION="1.2.0" \
            -D CPACK_PACKAGE_DESCRIPTION_SUMMARY="IMSProg - I2C/SPI/MicroWire Flash Programmer Suite" \
            -D CPACK_PACKAGE_DESCRIPTION="IMSProg is a Linux/macOS programmer suite for I2C, SPI, and MicroWire EEPROM/Flash chips, featuring fully integrated database management, hardware controllers, and visual editor tools." \
            -D CPACK_PACKAGE_CONTACT="Your Email <your.email@example.com>" \
            -D CPACK_DEBIAN_PACKAGE_SHLIBDEPS=ON \
            -D CPACK_DEBIAN_PACKAGE_ARCHITECTURE="amd64" \
            -D CPACK_INSTALL_CMAKE_PROJECTS=".;IMSProg;ALL;/" \
            -D CPACK_PACKAGE_FILE_NAME="imsprog" \
            -D CPACK_CMAKE_GENERATOR="Unix Makefiles"
          
          # 3. Create destination directory and safely migrate the package
          mkdir -p ../dist-deb
          mv imsprog*.deb ../dist-deb/imsprog-${{ matrix.name }}-amd64.deb

      # 4. Upload DEB package to unique GitHub Action artifact block
      - name: Upload DEB Artifacts
        uses: actions/upload-artifact@v4.6.1
        with:
          name: deb-${{ matrix.name }}
          path: dist-deb/*.deb

  fedora-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          dnf install -y dnf-plugins-core rpm-build rpmlint rpmdevtools wget \
                         hunspell-es hunspell-it hunspell-pt
          dnf builddep -y rpm/*.spec
      - name: Prepare build environment
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/*.spec ~/rpmbuild/SPECS/
          spectool -g -R ~/rpmbuild/SPECS/*.spec
      - name: Build RPM package
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/*.spec
      - name: Check RPM with rpmlint
        run: |
          rpmlint ~/rpmbuild/RPMS/*/*.rpm || true
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4.6.1
        with:
          name: fedora-44-rpm
          path: ~/rpmbuild/RPMS/*/*.rpm

  # --- MacOS ---
  macos:
    runs-on: macos-15
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Install dependencies via Homebrew
        run: |
          # Run update with API bypass flag to prevent untrusted tap warnings
          HOMEBREW_NO_INSTALL_FROM_API=1 brew update
          brew install qt@6 libusb pkg-config

      - name: Configure CMake
        run: |
          # Help pkg-config find libusb metadata files on ARM64 macOS
          export PKG_CONFIG_PATH="/opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH"
          
          # Pass the -L flag to force the linker to search the Homebrew folder
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_EXE_LINKER_FLAGS="-L/opt/homebrew/lib"

      - name: Build Application
        run: |
          cmake --build build --config Release --parallel

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p dist
          find build -type f -perm +111 -not -path "*/CMakeFiles/*" -exec cp {} dist/ \; || true
          find build -name "*.app" -type d -maxdepth 3 -exec cp -r {} dist/ \; || true
          cd dist
          if [ "$(ls -A)" ]; then
              zip -r ../macos-arm64-build.zip .
          else
              echo "Error: No build artifacts found in dist/ directory!"
              exit 1
          fi

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4.6.1
        with:
          name: macos-arm64-application
          path: macos-arm64-build.zip
