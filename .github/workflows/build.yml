name: Build

on:
  push:
    branches-ignore:
      - "debian/**"
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/index.html"
  pull_request:
    branches-ignore:
      - "debian/**"
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/index.html"
  workflow_dispatch:

jobs:
  amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [Ubuntu-20, Ubuntu-22, Debian-11, Debian-12, Debian-Testing, Debian-Experimental]
        cpp_compiler: [g++]
        include:
          - name: Ubuntu-20
            # Uses gcc 9.3.0, clang 10.0.0, cmake 3.16.3
            image: "ubuntu:20.04"
            ubuntu: 20
          - name: Ubuntu-22
            # Uses gcc 12.2.0, clang 15.0.7, cmake 3.24.2
            image: "ubuntu:22.04"
            ubuntu: 22
          - name: Debian-11
            # Uses gcc 10.2.1, clang 11.0.1, cmake 3.18.4
            image: "debian:bullseye"
          - name: Debian-11
            image: "debian:bullseye"
            c_compiler: clang
            cpp_compiler: clang++
          - name: Debian-12
            # Uses gcc 12.2.0, clang 15.0.6, cmake 3.25.1
            image: "debian:bookworm"
          - name: Debian-12
            image: "debian:bookworm"
            c_compiler: clang
            cpp_compiler: clang++
          - name: Debian-Testing
            image: "debian:testing"
          - name: Debian-Testing
            image: "debian:testing"
            c_compiler: clang
            cpp_compiler: clang++
          - name: Debian-Experimental
            image: "debian:experimental"
          - name: Debian-Experimental
            image: "debian:experimental"
            c_compiler: clang
            cpp_compiler: clang++
    container:
      image: ${{ matrix.image }}
      env:
        LANG: en_US.UTF-8
        BUILD_TYPE: ${{ matrix.build_type }}
        CC: ${{ matrix.c_compiler }}
        CXX: ${{ matrix.cpp_compiler }}
        WITH_PROJ: ON
        APT_LISTCHANGES_FRONTEND: none
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install packages required
        shell: bash
        run: |
          apt-get update -qq
          apt-get install -yq \
            clang \
            cmake \
            g++ \
            libusb-1.0-0-dev \
            qtbase5-dev \
            qttools5-dev \
            pkg-config
          apt-get satisfy "systemd-dev (>= 253-2~) | udev (<< 253-2~)" --yes
      - uses: actions/checkout@v6
      - name: Build
        working-directory: .
        run: |
          cmake .
          make
          make install

# ... (your existing amd64 job remains unchanged)

  fedora-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          dnf install -y dnf-plugins-core rpm-build rpmlint
          # Automatically install all BuildRequires listed in your spec file
          dnf builddep -y rpm/*.spec

      - name: Prepare build environment
        run: |
          # Create the required directory structure for rpmbuild
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          
          # Copy the spec file to the dedicated SPECS directory first
          cp rpm/*.spec ~/rpmbuild/SPECS/
          
          # Get the exact Source0 filename dynamicly from the spec file
          SOURCE_NAME=$(spectool -l ~/rpmbuild/SPECS/*.spec | awk '{print $2}' | xargs basename)
          
          # Pack the source code into the archive with the exact name rpmbuild expects
          tar --exclude='.git' -czf ~/rpmbuild/SOURCES/$SOURCE_NAME -C .. $(basename $(pwd))

      - name: Build RPM package
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/*.spec

      - name: Check RPM with rpmlint
        run: |
          rpmlint ~/rpmbuild/RPMS/*/*.rpm

      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-43-rpm
          path: ~/rpmbuild/RPMS/*/*.rpm
          
