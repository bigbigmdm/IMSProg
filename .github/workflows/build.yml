name: Build

on:
  push:
    branches-ignore:
      - "debian/**"
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/index.html"
  pull_request:
    branches-ignore:
      - "debian/**"
    paths-ignore:
      - "README.md"
      - "**/README.md"
      - "**/index.html"
  workflow_dispatch:

env:
  CMAKE_INSTALL_PARALLEL_LEVEL: 4

jobs:
  amd64:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: [Ubuntu-22, Ubuntu-24, Ubuntu-26, Debian-13, Debian-12, Debian-Testing, Debian-Experimental]
        cpp_compiler: [g++]
        include:
          - name: Ubuntu-22
            image: "ubuntu:22.04"
            ubuntu: 22
            deps: cmake g++ libusb-1.0-0-dev qtbase5-dev qttools5-dev pkgconf udev
          - name: Ubuntu-24
            image: "ubuntu:24.04"
            ubuntu: 24
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Ubuntu-26
            image: "ubuntu:26.04"
            ubuntu: 26
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Debian-13
            image: "debian:trixie"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Debian-13
            image: "debian:trixie"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Debian-12
            image: "debian:bookworm"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools udev
          - name: Debian-12
            image: "debian:bookworm"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools udev
          - name: Debian-Testing
            image: "debian:testing"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Debian-Testing
            image: "debian:testing"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Debian-Experimental
            image: "debian:experimental"
            deps: cmake g++ libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
          - name: Debian-Experimental
            image: "debian:experimental"
            c_compiler: clang
            cpp_compiler: clang++
            deps: cmake clang libusb-1.0-0-dev pkgconf qt6-base-dev qt6-tools-dev linguist-qt6 qt6-l10n-tools qt6-base-dev-tools qt6-tools-dev-tools systemd-dev
    container:
      image: ${{ matrix.image }}
      env:
        LANG: en_US.UTF-8
        BUILD_TYPE: ${{ matrix.build_type }}
        CC: ${{ matrix.c_compiler }}
        CXX: ${{ matrix.cpp_compiler }}
        WITH_PROJ: ON
        APT_LISTCHANGES_FRONTEND: none
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install packages required
        shell: bash
        run: |
          echo "Installing dependencies for ${{ matrix.item }}"
          apt-get update -qq
          apt-get install -yq ${{ matrix.deps }}
      - uses: actions/checkout@v7
      - name: Build
        working-directory: .
        run: |
          cmake -S . -B build/
          cmake --build build/ --parallel
          cmake --install build/

  fedora-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:44
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Install build dependencies
        run: |
          dnf install -y dnf-plugins-core rpm-build rpmlint rpmdevtools wget \
                         hunspell-es hunspell-it hunspell-pt
          dnf builddep -y rpm/*.spec
      - name: Prepare build environment
        run: |
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          cp rpm/*.spec ~/rpmbuild/SPECS/
          spectool -g -R ~/rpmbuild/SPECS/*.spec
      - name: Build RPM package
        run: |
          rpmbuild -ba ~/rpmbuild/SPECS/*.spec
      - name: Check RPM with rpmlint
        run: |
          rpmlint ~/rpmbuild/RPMS/*/*.rpm || true
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-44-rpm
          path: ~/rpmbuild/RPMS/*/*.rpm

  # --- НОВОЕ ЗАДАНИЕ ДЛЯ MACOS ---
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7

      - name: Install dependencies via Homebrew
        run: |
          brew update
          # Устанавливаем Qt 6, libusb и pkg-config
          brew install qt@6 libusb pkg-config

      - name: Configure CMake
        run: |
          # Передаем путь к установленной через Homebrew версии Qt 6
          # Также форсируем сборку Universal Binary (и для процессоров Intel, и для Apple M1/M2/M3)
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@6) \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"

      - name: Build Application
        run: |
          cmake --build build --config Release --parallel

      - name: Prepare Deployment Artifacts
        run: |
          # В macOS вместо системного install принято упаковывать бинарник 
          # Создаем временную папку и архивируем её в ZIP
          mkdir -p dist
          
          # Пытаемся найти результат сборки (поддерживает и обычный бинарник, и macOS .app корзину)
          if [ -d "build/Release" ]; then
              cp -r build/Release/* dist/
          elif [ -d "build" ]; then
              # Если CMake собирает напрямую в корень папки build
              find build -maxdepth 2 -name "*.app" -exec cp -r {} dist/ \; || true
              find build -maxdepth 1 -type f -permalink +111 -exec cp {} dist/ \; || true
          fi
          
          cd dist && zip -r ../macos-universal-build.zip .

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal-application
          path: macos-universal-build.zip
